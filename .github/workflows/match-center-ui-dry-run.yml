name: Match Center UI Dry Run

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Data cache da usare (YYYY-MM-DD)"
        required: false
        default: ""
      max_picks:
        description: "Cap finale selezioni uniche"
        required: false
        default: "40"
  schedule:
    - cron: "10 2 * * *"

jobs:
  dry-run-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl playwright
          python -m playwright install --with-deps chromium

      - name: Resolve inputs
        id: vars
        shell: bash
        run: |
          TARGET_DATE="${{ github.event.inputs.target_date }}"
          MAX_PICKS="${{ github.event.inputs.max_picks }}"

          if [ -z "$TARGET_DATE" ]; then
            TARGET_DATE=$(python -c "from datetime import datetime, timedelta, timezone; print((datetime.now(timezone.utc) + timedelta(days=1)).strftime('%Y-%m-%d'))")
          fi

          if [ -z "$MAX_PICKS" ]; then
            MAX_PICKS="40"
          fi

          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "max_picks=$MAX_PICKS" >> "$GITHUB_OUTPUT"

      - name: Run UI dry run
        shell: bash
        run: |
          python match_center_ui_dry_run.py \
            --repo-root . \
            --target-date "${{ steps.vars.outputs.target_date }}" \
            --max-picks "${{ steps.vars.outputs.max_picks }}"

      - name: Upload workbook artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: match-center-ui-dry-run-${{ steps.vars.outputs.target_date }}
          path: _match_center_ui_dry_run/${{ steps.vars.outputs.target_date }}/*.xlsx
          if-no-files-found: ignore
          retention-days: 14
