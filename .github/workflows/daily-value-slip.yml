name: Daily Value Slip

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Date to generate in YYYY-MM-DD. Leave empty for Europe/Dublin today.'
        required: false
        default: ''
  schedule:
    - cron: '15 8 * * *'

jobs:
  daily-value-slip:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TZ: Europe/Dublin
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl playwright
          python -m playwright install --with-deps chromium

      - name: Resolve target date
        id: target_date
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            TARGET_DATE="${{ github.event.inputs.target_date }}"
          else
            TARGET_DATE=$(TZ=Europe/Dublin date +%F)
          fi
          echo "target_date=$TARGET_DATE" >> "$GITHUB_OUTPUT"
          echo "Using target date: $TARGET_DATE"

      - name: Generate isolated daily value slip
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          if [ -z "$API_FOOTBALL_KEY" ]; then
            echo 'Missing secret API_FOOTBALL_KEY' >&2
            exit 1
          fi
          mkdir -p _ci_tools
          cp daily_value_slip.py _ci_tools/daily_value_slip.py
          python _ci_tools/daily_value_slip.py \
            --source-repo "$GITHUB_WORKSPACE" \
            --work-repo "$RUNNER_TEMP/value-slip-work" \
            --date "${{ steps.target_date.outputs.target_date }}"

      - name: Upload daily value slip artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-value-slip-${{ steps.target_date.outputs.target_date }}
          path: |
            ${{ runner.temp }}/value-slip-work/_value_slip_daily_output
          if-no-files-found: error
          retention-days: 14
